# .github/workflows/ci.yml
# Runs on every PR — lint + typecheck + test

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: [self-hosted, RUNNER-BUILD]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo typecheck

      - run: pnpm turbo lint
