# .github/workflows/ci.yml
# Disabled automatic triggers until self-hosted runner is available.
# Run manually via: Actions → CI → Run workflow

name: CI

on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted, RUNNER-BUILD]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo typecheck

      - run: pnpm turbo lint
